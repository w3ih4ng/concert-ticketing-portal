{% extends "base.html" %}
{% block title %}Add Tickets — {{ concert.title }}{% endblock %}
{% block content %}
<h1>Add Ticket Category</h1>

<form class="surface form-card" action="/concerts/{{ concert.id }}/tickets/new" method="post">
  <p>For <strong>{{ concert.title }}</strong> — {{ concert.date }}, {{ concert.venue }}</p>

  <label>Category</label>
  <input name="category" placeholder="e.g. VIP, Standard" required>

  <label>Price (RM)</label>
  <input name="price" type="number" min="0" step="0.01" required>

  <label>Quantity</label>
  <input name="quantity" type="number" min="1" value="1" required>

  <button type="submit">Add ticket category</button>
</form>
{% endblock %}
