{% extends "base.html" %}
{% block title %}Create Concert{% endblock %}
{% block content %}
<h1>Create Concert</h1>
<form class="surface form-card" action="/concerts/new" method="post">
  <label>Title</label>
  <input name="title" required>
  <label>Date</label>
  <input name="date" type="date" required>
  <label>Venue</label>
  <input name="venue" required>
  <label>Organiser</label>
  <input name="organiser" required>
  <button type="submit">Create concert</button>
</form>
{% endblock %}
